<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator | PPP</title>
</head>
<body>
    <div class="container">
         <h1 class="title">Calculator</h1>
         <p class="description">A simple calculator built with HTML, CSS, and JavaScript.</p>
     </div>
     <div class="floating-bg"></div>
    <div class="wrapper">
         <section class="screen">
            0
         </section>
         <section class="calc-buttons">
         <div class="calc-btn-row">
            <button class="calc-btn double">
                AC
            </button>
            <button class="calc-btn">
                &larr;
            </button>
            <button class="calc-btn">
                &divide;
            </button>
          </div>
            <div class="calc-btn-row">
                <button class="calc-btn">
                    7
                </button>
                <button class="calc-btn">
                    8
                </button>
                <button class="calc-btn">
                    9
                </button>
                <button class="calc-btn">
                    &times;
                </button>
            </div>
            <div class="calc-btn-row">
                <button class="calc-btn">
                    4
                </button>
                <button class="calc-btn">
                    5
                </button>
                <button class="calc-btn">
                    6
                </button>
                <button class="calc-btn">
                    &minus;
                </button>
            </div>
            <div class="calc-btn-row">
                <button class="calc-btn">
                    1
                </button>
                <button class="calc-btn">
                    2
                </button>
                <button class="calc-btn">
                    3
                </button>
                <button class="calc-btn">
                    &plus;
                </button>
            </div>
            <div class="calc-btn-row">
                <button class="calc-btn triple">
                    0
                </button>
                <button class="calc-btn">
                    &equals;
                </button>
            </div>
         </section>   
        </div>

   
    <script src="script.js"></script>
</body>
</html>
